server:
  port: 8080

spring:
  application:
    name: secure-bank-api

  datasource:
    url: jdbc:postgresql://localhost:5432/secure_bank_db
    username: postgres
    password: Admin@123

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

security:
  jwt:
    secret: "a3f9b2c1d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1"
    issuer: secure-bank-api
    access-token-expiration-minutes: 15

mullatoez:
  sensitive-logger:
    enabled: true
    mask-full-by-default: false
    output-json: true